name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rmm-01
          base: header, activity, community, repositories
          config_timezone: America/Lima
          config_display: large
          config_animations: yes

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rmm-01
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          config_animations: yes

      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rmm-01
          base: ""
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_from: 200
          config_animations: yes

      - name: Isometric Contributions
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rmm-01
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_animations: yes

      - name: Recent Activity
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rmm-01
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          config_animations: yes
